<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jigsaw Master V9 - 终极无缝庆典版</title>
    <style>
        :root {
            --primary: #00a8ff;
            --accent: #e056fd;
            --bg-dark: #1e272e;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-dark);
            /* 精致的暗色纹理背景 */
            background-image: 
                radial-gradient(circle at 50% 50%, #2f3640 2px, transparent 2.5px);
            background-size: 40px 40px;
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
            user-select: none;
        }

        /* === 启动面板 === */
        #setup-panel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(30, 39, 46, 0.98);
            z-index: 2000;
            display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(8px);
        }

        .panel-box {
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            width: 720px;
            display: flex; flex-direction: column; gap: 24px;
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        h2 { margin: 0; border-bottom: 2px solid #f1f2f6; padding-bottom: 15px; color: #2f3542; }
        .row { display: flex; gap: 20px; align-items: center; }
        .label { font-weight: bold; color: #57606f; width: 60px; text-align: right; }
        .content { flex: 1; }

        .upload-area {
            height: 120px;
            border: 2px dashed #ced6e0;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            background: #f1f2f6; cursor: pointer; position: relative;
            overflow: hidden; transition: 0.3s;
        }
        .upload-area:hover { background: #dfe4ea; border-color: var(--primary); }
        .upload-area img { position: absolute; width: 100%; height: 100%; object-fit: contain; display: none; }

        /* 形状选择 */
        .shape-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 12px; }
        .shape-opt {
            aspect-ratio: 1; border: 1px solid #dfe4ea; border-radius: 8px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.2s; background: #fff;
        }
        .shape-opt:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .shape-opt.active { 
            border-color: var(--primary); background: #f0f9ff; 
            box-shadow: 0 0 0 2px var(--primary); transform: scale(1.05);
        }
        .shape-opt svg { width: 65%; height: 65%; fill: none; stroke: #57606f; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .shape-opt.active svg { stroke: var(--primary); }

        .btn-start {
            background: linear-gradient(135deg, var(--primary), #0984e3);
            color: white; border: none;
            padding: 16px; border-radius: 10px; font-size: 18px;
            cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px;
            transition: 0.3s; box-shadow: 0 10px 20px rgba(9, 132, 227, 0.3);
        }
        .btn-start:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(9, 132, 227, 0.4); }

        /* === 游戏界面 === */
        #game-view { display: none; width: 100vw; height: 100vh; position: relative; }
        canvas { display: block; width: 100%; height: 100%; }

        #toolbar {
            position: absolute; top: 0; left: 0; width: 100%; height: 50px;
            background: rgba(47, 54, 64, 0.9);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px; box-sizing: border-box; z-index: 100;
            color: #dfe4ea; border-bottom: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px); transition: opacity 0.5s;
        }
        
        .t-btn {
            background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2);
            padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; margin-left: 12px;
            transition: 0.2s;
        }
        .t-btn:hover { background: rgba(255,255,255,0.2); }

        /* 参考图 */
        #ghost-win {
            position: absolute; top: 100px; left: 50%; transform: translateX(-50%);
            width: 320px; background: rgba(0,0,0,0.6); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; z-index: 500;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
            backdrop-filter: blur(12px); transition: opacity 0.5s;
        }
        #ghost-bar {
            background: rgba(0,0,0,0.3); height: 32px;
            display: flex; align-items: center; padding: 0 10px; cursor: move; 
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        #ghost-bar button { background: none; border: none; color: #a4b0be; font-size: 12px; cursor: pointer; padding: 0 8px; }
        #ghost-bar button:hover { color: #fff; }
        #ghost-img { width: 100%; display: block; pointer-events: none; border-radius: 0 0 8px 8px; opacity: 0.8; }

        /* === 胜利庆典层 === */
        #victory-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 3000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 1s;
        }
        
        /* 最终完整大图容器 */
        #final-container {
            position: relative; z-index: 3002;
            padding: 10px; background: #fff; border-radius: 4px;
            box-shadow: 0 0 100px rgba(255, 215, 0, 0.4);
            transform: scale(0.8); opacity: 0;
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #final-container.show { transform: scale(1); opacity: 1; }
        #final-img { max-height: 70vh; max-width: 80vw; display: block; }

        /* 烟花画布 */
        #fireworks-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 3001; pointer-events: none;
        }

        .victory-title {
            color: #f1c40f; font-size: 4rem; font-weight: 800; margin-bottom: 40px; z-index: 3002;
            text-shadow: 0 0 30px #e67e22; letter-spacing: 5px;
            animation: textFloat 3s ease-in-out infinite;
        }
        @keyframes textFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

        .btn-replay {
            margin-top: 40px; padding: 12px 40px; font-size: 18px;
            background: transparent; border: 2px solid #fff; color: #fff;
            border-radius: 30px; cursor: pointer; z-index: 3002; font-weight: bold;
            transition: 0.2s;
        }
        .btn-replay:hover { background: #fff; color: #333; transform: scale(1.1); }

    </style>
</head>
<body>

<!-- 设置面板 -->
<div id="setup-panel">
    <div class="panel-box">
        <h2>🧩 创建拼图游戏</h2>
        
        <div class="row">
            <div class="label">图片:</div>
            <div class="content upload-area" onclick="document.getElementById('fileIn').click()">
                <span style="color:#747d8c">📂 点击上传图片 / 拖拽图片</span>
                <img id="prev-img">
                <input type="file" id="fileIn" accept="image/*" style="display:none">
            </div>
        </div>

        <div class="row">
            <div class="label">难度:</div>
            <div class="content">
                <input type="range" id="pc-range" min="12" max="400" value="35" oninput="document.getElementById('pc-txt').innerText=this.value+' 片'" style="width:100%">
                <div style="text-align:center; color:var(--primary); font-weight:bold" id="pc-txt">35 片</div>
            </div>
        </div>

        <div class="row" style="align-items: flex-start;">
            <div class="label" style="margin-top:10px">形状:</div>
            <div class="content">
                <div class="shape-grid">
                    <div class="shape-opt" onclick="selShape(0, this)" title="方形"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16"/></svg></div>
                    <div class="shape-opt active" onclick="selShape(1, this)" title="经典(优)"><svg viewBox="0 0 24 24"><path d="M4,4 L10,4 C10,4 10,7 12,7 C14,7 14,4 14,4 L20,4 L20,10 C20,10 17,10 17,12 C17,14 20,14 20,14 L20,20 L14,20 C14,20 14,17 12,17 C10,17 10,20 10,20 L4,20 L4,14 C4,14 7,14 7,12 C7,10 4,10 4,10 Z"/></svg></div>
                    <div class="shape-opt" onclick="selShape(2, this)" title="圆润"><svg viewBox="0 0 24 24"><path d="M4,4 L20,4 L20,20 L4,20 Z" style="stroke-width:1"/><circle cx="12" cy="4" r="2"/><circle cx="20" cy="12" r="2"/><circle cx="12" cy="20" r="2"/><circle cx="4" cy="12" r="2"/></svg></div>
                    <div class="shape-opt" onclick="selShape(3, this)" title="骨头"><svg viewBox="0 0 24 24"><path d="M4,4 Q12,8 20,4 L20,20 Q12,16 4,20 Z"/></svg></div>
                    <div class="shape-opt" onclick="selShape(4, this)" title="尖刺"><svg viewBox="0 0 24 24"><path d="M4,4 L10,4 L12,1 L14,4 L20,4 L20,20 L4,20 Z"/></svg></div>
                    <div class="shape-opt" onclick="selShape(5, this)" title="锯齿"><svg viewBox="0 0 24 24"><path d="M4,4 L8,4 L10,2 L12,6 L14,2 L16,4 L20,4 L20,20 L4,20 Z"/></svg></div>
                    <div class="shape-opt" onclick="selShape(6, this)" title="波浪"><svg viewBox="0 0 24 24"><path d="M4,4 Q8,8 12,4 T20,4 L20,20 L4,20 Z"/></svg></div>
                    <div class="shape-opt" onclick="selShape(7, this)" title="疯狂"><svg viewBox="0 0 24 24"><path d="M4,4 L12,2 L20,4 L22,12 L20,20 L12,22 L4,20 L2,12 Z"/></svg></div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="label">选项:</div>
            <label style="cursor:pointer; display:flex; align-items:center; color:#57606f">
                <input type="checkbox" id="rot-chk">
                <span style="margin-left:8px">允许旋转 (增加难度)</span>
            </label>
        </div>

        <button class="btn-start" onclick="initGame()">开始游戏</button>
    </div>
</div>

<!-- 游戏主界面 -->
<div id="game-view">
    <div id="toolbar">
        <div style="font-weight:bold; font-size:18px; display:flex; align-items:center; gap:10px">
            <span>🧩</span> <span id="prog-txt" style="color:#00a8ff">进度: 0%</span>
        </div>
        <div>
            <button class="t-btn" onclick="toggleGhost()">👁️ 参考图</button>
            <button class="t-btn" onclick="scatter(true)">🌪️ 整理/打散</button>
            <button class="t-btn" onclick="location.reload()">⬅️ 退出</button>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <div id="ghost-win">
        <div id="ghost-bar">
            <button onclick="setGhost(0.25)">25%</button>
            <button onclick="setGhost(0.50)">50%</button>
            <button onclick="setGhost(0.75)">75%</button>
            <button onclick="setGhost(1.00)">100%</button>
            <span style="flex:1"></span>
            <button onclick="toggleGhost()" style="font-weight:bold; font-size:14px">×</button>
        </div>
        <div id="ghost-content"><img id="ghost-img"></div>
    </div>
</div>

<!-- 胜利庆典层 -->
<div id="victory-layer">
    <canvas id="fireworks-canvas"></canvas>
    <div class="victory-title">🎉 拼图完成！</div>
    <div id="final-container">
        <img id="final-img">
    </div>
    <button class="btn-replay" onclick="location.reload()">再玩一次</button>
</div>

<script>
    // === 配置 ===
    const CFG = {
        snap: 18,            // 吸附距离
        margin: 150,         // 停靠区边距
        colors: { 
            bg: '#1e272e', 
            sel: 'rgba(0, 168, 255, 0.2)', 
            selBorder: '#00a8ff' 
        }
    };

    let S = {
        img: null,
        w: 0, h: 0,
        rows: 0, cols: 0,
        pieces: [], groups: [],
        view: { x:0, y:0, scale:0.8 },
        shapeType: 1, 
        rotate: false,
        mode: 'idle', // idle, drag, select
        lastPt: {x:0, y:0}, selStart: {x:0, y:0},
        selection: [], 
        active: null,
        audio: null,
        won: false
    };

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', {alpha: false});
    // 默认图：猫咪
    const defImg = "https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80";

    window.onload = () => {
        document.getElementById('fileIn').onchange = e => {
            const f = e.target.files[0];
            if(f){
                const r = new FileReader();
                r.onload = evt => {
                    document.getElementById('prev-img').src = evt.target.result;
                    document.getElementById('prev-img').style.display = 'block';
                    S.img = new Image();
                    S.img.src = evt.target.result;
                }
                r.readAsDataURL(f);
            }
        };
        initGhostDrag();
        selShape(1, document.querySelector('.shape-opt.active'));
    };

    function selShape(idx, el) {
        S.shapeType = idx;
        document.querySelectorAll('.shape-opt').forEach(d => d.classList.remove('active'));
        el.classList.add('active');
    }

    function initGame() {
        if(!S.img) {
            S.img = new Image();
            S.img.crossOrigin = "Anonymous";
            S.img.src = defImg;
            S.img.onload = startGame;
        } else startGame();
    }

    function startGame() {
        document.getElementById('setup-panel').style.display = 'none';
        document.getElementById('game-view').style.display = 'block';
        window.addEventListener('resize', resize);
        resize();
        
        document.getElementById('ghost-img').src = S.img.src;
        setGhost(0.5);

        generate();
        
        canvas.addEventListener('mousedown', onDown);
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
        canvas.addEventListener('wheel', onWheel, {passive:false});
        canvas.addEventListener('contextmenu', e=>{ e.preventDefault(); rotateSel(1); });
        
        window.addEventListener('keydown', e=>{
            if(S.selection.length && S.rotate) {
                if(e.key==='ArrowRight') rotateSel(1);
                if(e.key==='ArrowLeft') rotateSel(-1);
            }
        });

        S.audio = new (window.AudioContext||window.webkitAudioContext)();
        loop();
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    // === 生成逻辑 ===
    function generate() {
        const count = parseInt(document.getElementById('pc-range').value);
        S.rotate = document.getElementById('rot-chk').checked;
        
        const ratio = S.img.width / S.img.height;
        S.cols = Math.round(Math.sqrt(count * ratio));
        S.rows = Math.round(count / S.cols);
        S.w = S.img.width; S.h = S.img.height;
        
        const pW = S.w / S.cols;
        const pH = S.h / S.rows;
        
        // 生成形状
        const shapes = [];
        for(let y=0; y<S.rows; y++){
            for(let x=0; x<S.cols; x++){
                shapes.push({
                    top: y===0 ? 0 : -shapes[(y-1)*S.cols+x].bottom,
                    right: x===S.cols-1 ? 0 : (Math.random()>0.5?1:-1),
                    bottom: y===S.rows-1 ? 0 : (Math.random()>0.5?1:-1),
                    left: x===0 ? 0 : -shapes[shapes.length-1].right,
                    seed: Math.random()
                });
            }
        }
        
        S.pieces = [];
        S.groups = [];
        
        // 渲染每一块
        for(let y=0; y<S.rows; y++){
            for(let x=0; x<S.cols; x++){
                const idx = y*S.cols + x;
                const shape = shapes[idx];
                const pad = Math.max(pW, pH) * 0.45;
                
                const cvs = document.createElement('canvas');
                cvs.width = pW + pad*2;
                cvs.height = pH + pad*2;
                const c = cvs.getContext('2d');
                
                const sx = pad, sy = pad;
                c.save();
                c.beginPath();
                drawShape(c, sx, sy, pW, pH, shape, S.shapeType);
                c.clip();
                c.drawImage(S.img, x*pW - pad, y*pH - pad, cvs.width, cvs.height, 0, 0, cvs.width, cvs.height);
                c.restore();
                
                // === 关键修复：无缝处理 ===
                // 在缓存层，只画极其微弱的内发光，**不画**投影，防止拼接黑线
                c.save();
                c.beginPath();
                drawShape(c, sx, sy, pW, pH, shape, S.shapeType);
                c.lineWidth = 1;
                c.strokeStyle = "rgba(255,255,255,0.4)"; // 极淡的高光
                c.stroke();
                // 极淡的暗边 (几乎不可见，只为了单块时有体积感)
                c.lineWidth = 0.5;
                c.strokeStyle = "rgba(0,0,0,0.15)";
                c.stroke();
                c.restore();
                
                const piece = { id:idx, ix:x, iy:y, w:pW, h:pH, cvs:cvs, ox:cvs.width/2, oy:cvs.height/2 };
                S.pieces.push(piece);
                S.groups.push({
                    id: idx, pieces:[piece], x:0, y:0,
                    rot: S.rotate ? Math.floor(Math.random()*4) : 0
                });
            }
        }
        
        scatter(true);
    }

    // === 核心形状算法 (经典优化版) ===
    function drawShape(ctx, x, y, w, h, s, type) {
        if(type === 0) { ctx.rect(x, y, w, h); return; }
        ctx.moveTo(x, y);
        edge(ctx, x, y, x+w, y, s.top, type, s.seed);
        edge(ctx, x+w, y, x+w, y+h, s.right, type, s.seed);
        edge(ctx, x+w, y+h, x, y+h, s.bottom, type, s.seed);
        edge(ctx, x, y+h, x, y, s.left, type, s.seed);
    }

    function edge(ctx, x1, y1, x2, y2, t, type, seed) {
        if(t === 0) { ctx.lineTo(x2, y2); return; }
        const dx = x2 - x1, dy = y2 - y1;
        const len = Math.sqrt(dx*dx + dy*dy);
        ctx.save();
        ctx.translate(x1, y1);
        ctx.rotate(Math.atan2(dy, dx));
        const sign = t > 0 ? -1 : 1;
        
        if(type===1) { // 经典优化 (图2风格)
            const n1 = 0.35 * len;
            const n2 = 0.65 * len;
            const h = sign * len * 0.25;
            ctx.bezierCurveTo(len*0.2, 0, len/3, 0, n1, 0);
            ctx.bezierCurveTo(len*0.35, h*0.2, len*0.35, h, len*0.5, h);
            ctx.bezierCurveTo(len*0.65, h, len*0.65, h*0.2, n2, 0);
            ctx.bezierCurveTo(len*2/3, 0, len*0.8, 0, len, 0);
        } else if(type===2) { // Round
             ctx.bezierCurveTo(len*0.1, 0, len*0.3, sign*len*0.35, len*0.5, sign*len*0.35);
             ctx.bezierCurveTo(len*0.7, sign*len*0.35, len*0.9, 0, len, 0);
        } else if(type===3) { // Bone
             ctx.bezierCurveTo(len*0.2, sign*len*0.15, len*0.2, sign*len*0.3, len*0.5, sign*len*0.3);
             ctx.bezierCurveTo(len*0.8, sign*len*0.3, len*0.8, sign*len*0.15, len, 0);
        } else if(type===4) { // Spike
             ctx.lineTo(len*0.35, 0); ctx.lineTo(len*0.5, sign*len*0.35); ctx.lineTo(len*0.65, 0); ctx.lineTo(len, 0);
        } else if(type===5) { // Saw
             ctx.lineTo(len*0.25, sign*len*0.15); ctx.lineTo(len*0.5, 0); ctx.lineTo(len*0.75, sign*len*0.15); ctx.lineTo(len, 0);
        } else if(type===6) { // Wave
             ctx.bezierCurveTo(len*0.3, sign*len*0.2, len*0.7, -sign*len*0.2, len, 0);
        } else if(type===7) { // Crazy
             const j = (seed*0.2)*len; 
             ctx.bezierCurveTo(len*0.3, j, len*0.35, sign*len*0.3+j, len*0.5, sign*len*0.3);
             ctx.bezierCurveTo(len*0.65, sign*len*0.3-j, len*0.7, -j, len, 0);
        }
        ctx.restore();
    }

    // === 停靠与打散 ===
    function scatter(resetView) {
        const marginX = 140;
        S.groups.forEach((g, i) => {
            if(g.pieces.length > 1) return;
            const side = (i%2===0) ? -1 : 1;
            const baseX = side * (S.w/2 + marginX);
            g.x = baseX + (Math.random()-0.5) * 150;
            g.y = (Math.random()-0.5) * (S.h * 1.5);
            g.rot = S.rotate ? Math.floor(Math.random()*4) : 0;
        });
        S.selection = [];
        if(resetView) {
            S.view.x = 0; S.view.y = 0;
            const totalW = S.w + 600;
            const sW = canvas.width / totalW;
            const sH = canvas.height / (S.h * 1.6);
            S.view.scale = Math.min(sW, sH, 0.9);
        }
    }

    // === 交互 ===
    function toWorld(ex, ey) {
        return {
            x: (ex - canvas.width/2)/S.view.scale - S.view.x,
            y: (ey - canvas.height/2)/S.view.scale - S.view.y
        };
    }

    function onDown(e) {
        if(S.won || e.button !== 0) return;
        const pt = toWorld(e.clientX, e.clientY);
        
        let hit = null;
        for(let i=S.groups.length-1; i>=0; i--) {
            const g = S.groups[i];
            for(let p of g.pieces) {
                const pos = getPos(g, p);
                if(Math.hypot(pt.x - pos.x, pt.y - pos.y) < p.w*0.5) {
                    hit = g; break;
                }
            }
            if(hit) break;
        }

        if(hit) {
            S.mode = 'drag';
            S.active = hit;
            S.lastPt = pt;
            
            if(!S.selection.includes(hit) && !e.shiftKey) S.selection = [];
            if(!S.selection.includes(hit)) S.selection.push(hit);
            
            S.selection.forEach(selG => {
                const i = S.groups.indexOf(selG);
                if(i>-1) { S.groups.splice(i,1); S.groups.push(selG); }
            });
            play('pick');
        } else {
            if(!e.shiftKey) S.selection = [];
            S.mode = 'select';
            S.selStart = pt;
            S.lastPt = pt;
        }
    }

    function onMove(e) {
        const pt = toWorld(e.clientX, e.clientY);
        if(S.mode === 'drag') {
            const dx = pt.x - S.lastPt.x;
            const dy = pt.y - S.lastPt.y;
            S.selection.forEach(g => { g.x+=dx; g.y+=dy; });
            S.lastPt = pt;
        } else if(S.mode === 'select') {
            S.lastPt = pt;
        }
    }

    function onUp() {
        if(S.mode === 'drag') {
            let snapped = false;
            const toCheck = [...S.selection];
            toCheck.forEach(g => { if(checkSnap(g)) snapped = true; });
            if(snapped) play('snap'); else play('drop');
        } else if(S.mode === 'select') {
            const x1 = Math.min(S.selStart.x, S.lastPt.x);
            const x2 = Math.max(S.selStart.x, S.lastPt.x);
            const y1 = Math.min(S.selStart.y, S.lastPt.y);
            const y2 = Math.max(S.selStart.y, S.lastPt.y);
            S.groups.forEach(g => {
                for(let p of g.pieces) {
                    const pos = getPos(g, p);
                    if(pos.x>=x1 && pos.x<=x2 && pos.y>=y1 && pos.y<=y2) {
                        if(!S.selection.includes(g)) S.selection.push(g);
                        break;
                    }
                }
            });
        }
        S.mode = 'idle'; S.active = null;
    }

    function onWheel(e) {
        e.preventDefault();
        const sc = e.deltaY < 0 ? 1.1 : 0.9;
        const pt = toWorld(e.clientX, e.clientY);
        S.view.scale = Math.max(0.1, Math.min(6, S.view.scale * sc));
        const pt2 = toWorld(e.clientX, e.clientY);
        S.view.x += pt2.x - pt.x;
        S.view.y += pt2.y - pt.y;
    }

    function getPos(g, p) {
        let rx = (p.ix + 0.5)*p.w - S.w/2;
        let ry = (p.iy + 0.5)*p.h - S.h/2;
        let x=rx, y=ry;
        if(g.rot === 1) { x = -ry; y = rx; }
        else if(g.rot === 2) { x = -rx; y = -ry; }
        else if(g.rot === 3) { x = ry; y = -rx; }
        return { x: g.x + x, y: g.y + y };
    }

    function rotateSel(dir) {
        if(!S.selection.length) return;
        S.selection.forEach(g => g.rot = (g.rot+dir+4)%4);
        play('pick');
    }

    function checkSnap(g) {
        if(S.won) return false;
        let merged = false;
        
        // 1. 组间吸附
        for(let other of S.groups) {
            if(other === g || (S.rotate && other.rot !== g.rot) || S.selection.includes(other)) continue;
            for(let p1 of g.pieces) {
                for(let p2 of other.pieces) {
                    if(Math.abs(p1.ix - p2.ix) + Math.abs(p1.iy - p2.iy) === 1) {
                        const d = Math.hypot(g.x - other.x, g.y - other.y);
                        if(d < CFG.snap/S.view.scale) {
                            merge(other, g); return true;
                        }
                    }
                }
            }
        }
        // 2. 归位吸附
        if(g.rot === 0) {
            // 如果已经是最后一块大拼图，自动归位
            if(S.groups.length === 1 && g.pieces.length === S.rows*S.cols) {
                g.x = 0; g.y = 0;
                updateProg();
                return true;
            }
            if(Math.hypot(g.x, g.y) < CFG.snap/S.view.scale) {
                g.x=0; g.y=0;
                for(let i=S.groups.length-1; i>=0; i--){
                    let t = S.groups[i];
                    if(t!==g && t.x===0 && t.y===0 && t.rot===0) { merge(t, g); return true; }
                }
                updateProg();
                return true;
            }
        }
        return false;
    }

    function merge(base, sub) {
        base.pieces = base.pieces.concat(sub.pieces);
        const idx = S.groups.indexOf(sub);
        if(idx > -1) S.groups.splice(idx, 1);
        const sIdx = S.selection.indexOf(sub);
        if(sIdx > -1) S.selection.splice(sIdx, 1);
        if(!S.selection.includes(base) && sIdx > -1) S.selection.push(base);
        updateProg();
    }

    function updateProg() {
        const total = S.rows * S.cols;
        const cur = S.groups.length;
        const pct = Math.floor(((total-cur)/(total-1))*100);
        document.getElementById('prog-txt').innerText = `进度: ${pct}%`;
        
        // 核心胜利触发
        if(cur === 1 && S.groups[0].pieces.length === total) {
            // 自动吸附到中心并胜利
            S.groups[0].x = 0;
            S.groups[0].y = 0;
            // 延迟一点让用户看到最后一块拼上去
            setTimeout(onWin, 200);
        }
    }

    function onWin() {
        if(S.won) return;
        S.won = true;
        play('win');
        
        // 隐藏UI
        document.getElementById('toolbar').style.opacity = 0;
        document.getElementById('ghost-win').style.opacity = 0;

        // 显示胜利层
        const layer = document.getElementById('victory-layer');
        layer.style.display = 'flex';
        // 强制重绘
        void layer.offsetWidth;
        layer.style.opacity = 1;
        
        document.getElementById('final-img').src = S.img.src;
        document.getElementById('final-container').classList.add('show');
        
        startFireworks();
    }

    // === 烟花系统 ===
    let particles = [];
    function startFireworks() {
        const cvs = document.getElementById('fireworks-canvas');
        const ctx = cvs.getContext('2d');
        cvs.width = window.innerWidth;
        cvs.height = window.innerHeight;
        
        const loopF = () => {
            if(!S.won) return;
            requestAnimationFrame(loopF);
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillStyle = 'rgba(0,0,0,0.15)'; // 拖尾
            ctx.fillRect(0,0,cvs.width, cvs.height);
            ctx.globalCompositeOperation = 'lighter';
            
            if(Math.random()<0.06) spawnFW(cvs.width, cvs.height);
            
            for(let i=particles.length-1; i>=0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.04; p.life *= 0.97;
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
                if(p.life<0.01) particles.splice(i,1);
            }
        };
        loopF();
    }
    
    function spawnFW(w, h) {
        const x = Math.random() * w;
        const y = Math.random() * h * 0.5;
        const hue = Math.floor(Math.random()*360);
        const count = 80;
        for(let i=0; i<count; i++) {
            const ang = Math.random()*Math.PI*2;
            const spd = Math.random()*4+2;
            particles.push({
                x:x, y:y, 
                vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd,
                color: `hsl(${hue}, 100%, 60%)`, life:1, size: Math.random()*2.5
            });
        }
    }

    // === 渲染循环 ===
    function loop() {
        ctx.fillStyle = CFG.colors.bg;
        ctx.fillRect(0,0,canvas.width, canvas.height);
        
        if(!S.won) {
            ctx.save();
            ctx.translate(canvas.width/2, canvas.height/2);
            ctx.scale(S.view.scale, S.view.scale);
            ctx.translate(S.view.x, S.view.y);

            // 桌面框
            ctx.strokeStyle = "rgba(255,255,255,0.05)";
            ctx.lineWidth = 2;
            ctx.strokeRect(-S.w/2, -S.h/2, S.w, S.h);
            
            // 选框
            if(S.mode === 'select') {
                const w = S.lastPt.x - S.selStart.x;
                const h = S.lastPt.y - S.selStart.y;
                ctx.fillStyle = CFG.colors.sel;
                ctx.fillRect(S.selStart.x, S.selStart.y, w, h);
                ctx.strokeStyle = CFG.colors.selBorder;
                ctx.lineWidth = 1/S.view.scale;
                ctx.strokeRect(S.selStart.x, S.selStart.y, w, h);
            }

            const renderList = [...S.groups].sort((a,b) => {
                const aSel = S.selection.includes(a);
                const bSel = S.selection.includes(b);
                if(a === S.active) return 1; 
                if(b === S.active) return -1;
                if(aSel && !bSel) return 1;
                if(!aSel && bSel) return -1;
                return 0;
            });

            for(let g of renderList) {
                const isSel = S.selection.includes(g);
                const isAct = g === S.active;
                
                ctx.save();
                ctx.translate(g.x, g.y);
                ctx.rotate(g.rot * Math.PI/2);
                
                // 投影：只给 active 或 选中的组加，或者所有组加但很淡
                // 关键修复：这里的阴影是针对 Group 整体的，不会导致内部黑线
                if(isSel || isAct) {
                    ctx.shadowColor = "rgba(0, 0, 0, 0.6)";
                    ctx.shadowBlur = 15/S.view.scale;
                    ctx.shadowOffsetY = 5/S.view.scale;
                } else {
                    ctx.shadowColor = "rgba(0,0,0,0.3)";
                    ctx.shadowBlur = 3/S.view.scale;
                }
                
                if(isAct) ctx.translate(0, -2/S.view.scale);

                for(let p of g.pieces) {
                    const tx = p.ix*p.w - S.w/2;
                    const ty = p.iy*p.h - S.h/2;
                    ctx.drawImage(p.cvs, tx - p.ox + p.w/2, ty - p.oy + p.h/2, p.cvs.width, p.cvs.height);
                }
                ctx.restore();
            }
            ctx.restore();
        }

        requestAnimationFrame(loop);
    }

    function toggleGhost() {
        const w = document.getElementById('ghost-win');
        w.style.display = w.style.display==='none'?'flex':'none';
    }
    function setGhost(s) {
        if(S.img) document.getElementById('ghost-win').style.width = Math.max(200, S.w * s * 0.5) + 'px';
    }
    function initGhostDrag() {
        const w = document.getElementById('ghost-win');
        const h = document.getElementById('ghost-bar');
        let d=false, sx, sy, lx, ly;
        h.onmousedown = e => { if(e.target.tagName!=='BUTTON'){ d=true; sx=e.clientX; sy=e.clientY; lx=w.offsetLeft; ly=w.offsetTop; }};
        window.addEventListener('mousemove', e => { if(d){ w.style.left=(lx+e.clientX-sx)+'px'; w.style.top=(ly+e.clientY-sy)+'px'; }});
        window.addEventListener('mouseup', ()=>d=false);
    }

    function play(t) {
        if(!S.audio) return;
        const o = S.audio.createOscillator();
        const g = S.audio.createGain();
        o.connect(g); g.connect(S.audio.destination);
        const now = S.audio.currentTime;
        if(t==='pick') { o.frequency.value=300; g.gain.value=0.1; o.start(); o.stop(now+0.1); }
        else if(t==='drop') { o.frequency.value=100; g.gain.value=0.05; o.start(); o.stop(now+0.05); }
        else if(t==='snap') { o.frequency.value=800; g.gain.value=0.2; o.start(); o.stop(now+0.1); }
        else if(t==='win') {
             o.frequency.setValueAtTime(400, now);
             o.frequency.linearRampToValueAtTime(800, now+0.3);
             g.gain.setValueAtTime(0.3, now);
             g.gain.linearRampToValueAtTime(0, now+1.0);
             o.start(); o.stop(now+1.0);
        }
    }
</script>
