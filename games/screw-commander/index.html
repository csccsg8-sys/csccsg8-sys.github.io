<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>螺母排序 - 战术指挥官版</title>
    <style>
        :root {
            --bg-color: #2f4f2f; /* 更深沉的指挥官绿 */
            --rod-metal: #bdc3c7;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-color);
            /* 雷达网格背景 */
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            font-family: "Microsoft YaHei", sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }

        /* 顶部UI */
        .header {
            margin-top: 20px;
            display: flex;
            gap: 20px;
            z-index: 100;
            padding: 15px 40px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .btn {
            background: #d35400;
            border: none;
            color: white;
            padding: 10px 25px;
            border-radius: 4px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 0 #a04000;
            transition: 0.1s;
        }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        .btn-restart { background: #2980b9; box-shadow: 0 4px 0 #1c5980; }
        .btn-home { background: #7f8c8d; box-shadow: 0 4px 0 #566566; }

        /* 游戏区域 */
        .stage {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding-bottom: 40px;
        }

        .board {
            display: flex;
            gap: 35px; 
            padding: 30px 50px;
            background: rgba(0,0,0,0.25);
            border-radius: 15px;
            border: 2px solid rgba(255,255,255,0.05);
        }

        /* 螺杆整体 */
        .rod-container {
            width: 80px;
            height: 600px; /* 进一步加高 */
            position: relative;
            display: flex;
            flex-direction: column-reverse; /* 底部向上堆叠 */
            align-items: center;
            cursor: pointer; /* 此时点击空白处也可触发放下 */
        }
        
        /* 增加点击热区，方便放下 */
        .rod-hitbox {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 0;
        }

        /* 金属螺纹杆 */
        .rod-metal {
            position: absolute;
            bottom: 0;
            width: 20px;
            height: 100%;
            background: repeating-linear-gradient(
                -45deg,
                #999,
                #999 2px,
                #666 3px,
                #666 4px
            );
            border-radius: 10px 10px 0 0;
            box-shadow: inset 2px 0 5px rgba(0,0,0,0.5);
            z-index: 0;
            pointer-events: none;
        }
        
        .rod-base {
            position: absolute;
            bottom: -15px;
            width: 70px;
            height: 15px;
            background: #555;
            border-radius: 50%;
            box-shadow: 0 5px 10px rgba(0,0,0,0.6);
            z-index: 0;
        }

        /* 螺母 */
        .nut {
            width: 80px;
            height: 17px;
            border-radius: 6px;
            z-index: 10; /* 保证在杆子上面 */
            position: relative;
            margin-bottom: 1px;
            box-shadow: 
                inset 0 2px 3px rgba(255,255,255,0.5),
                inset 0 -2px 3px rgba(0,0,0,0.3),
                0 4px 6px rgba(0,0,0,0.4);
            cursor: grab; /* 手型鼠标 */
            transition: filter 0.1s;
        }
        .nut:hover { filter: brightness(1.2); }
        .nut::after {
            content: '';
            position: absolute;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            width: 22px; height: 10px;
            background: #888;
            border-radius: 4px;
            box-shadow: inset 0 2px 3px rgba(0,0,0,0.6);
        }

        /* 拖拽层 - 显示手中的一串 */
        #drag-layer {
            position: fixed; pointer-events: none; z-index: 999;
            display: flex; flex-direction: column-reverse; /* 保持堆叠顺序 */
            filter: drop-shadow(10px 20px 20px rgba(0,0,0,0.6));
            transition: left 0.05s linear, top 0.05s linear;
            transform: translate(-50%, -100%); /* 让鼠标位于这串的最下方 */
        }

        /* 模态框 */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #f39c12;
        }
        .modal h1 { font-size: 4rem; margin-bottom: 30px; text-shadow: 0 0 20px #d35400; }
        
        .diff-group { display: flex; gap: 20px; }
        .diff-btn {
            background: transparent; border: 2px solid #f39c12; color: #f39c12;
            padding: 15px 30px; font-size: 20px; border-radius: 8px; cursor: pointer; transition: 0.2s;
        }
        .diff-btn:hover { background: #f39c12; color: #000; }

        #win-screen { display: none; }
        .shake { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 20% {transform: translateX(-5px);} 40% {transform: translateX(5px);} 60% {transform: translateX(-5px);} 80% {transform: translateX(5px);} }

    </style>
</head>
<body>

    <div class="header">
        <button class="btn btn-home" onclick="showStartScreen()">🏠 菜单</button>
        <div style="flex:1; text-align:center;">
            <span id="level-tag" style="color:#f39c12; font-size:20px; font-weight:bold;">难度: 兵王 (战术模式)</span>
            <div style="color:#aaa; font-size:12px;">提示: 点击任意螺母可整串搬运</div>
        </div>
        <button class="btn" onclick="undo()">↩ 撤销</button>
        <button class="btn btn-restart" onclick="restartLevel()">🔄 重来</button>
    </div>

    <div class="stage">
        <div class="board" id="board"></div>
    </div>

    <div id="drag-layer" style="display:none;"></div>

    <div id="start-screen" class="modal">
        <h1 style="color:#fff">🔩 战术指挥官</h1>
        <div class="diff-group">
            <button class="diff-btn" onclick="startGame(4)" style="border-color:#2ecc71; color:#2ecc71">🟢 新兵</button>
            <button class="diff-btn" onclick="startGame(6)" style="border-color:#f39c12; color:#f39c12">🟡 老兵</button>
            <button class="diff-btn" onclick="startGame(8)" style="border-color:#e74c3c; color:#e74c3c">🔴 兵王</button>
        </div>
    </div>

    <div id="win-screen" class="modal">
        <canvas id="confetti" style="position:absolute;top:0;left:0;pointer-events:none"></canvas>
        <h1>🏆 战役胜利!</h1>
        <div class="diff-group">
            <button class="diff-btn" onclick="showStartScreen()">选难度</button>
            <button class="diff-btn" onclick="restartLevel(true)">再来一局</button>
        </div>
    </div>

<script>
    // === 配置 ===
    const ALL_COLORS = [
        '#ff3f34', '#0fb9b1', '#f7b731', '#a55eea', 
        '#20bf6b', '#eb3b5a', '#2d98da', '#fa8231'
    ];

    const CONFIG = {
        capacity: 30, 
        emptyRods: 2
    };

    let STATE = {
        colorCount: 8,
        rods: [], 
        history: [],
        hand: [], // 拿着的一串螺母
        fromRod: -1, // 从哪拿的
        audioContext: null
    };

    // === 初始化 ===
    function showStartScreen() {
        document.getElementById('start-screen').style.display = 'flex';
        document.getElementById('win-screen').style.display = 'none';
        document.getElementById('board').innerHTML = '';
        STATE.hand = [];
        updateDragLayer();
    }

    function startGame(colors) {
        STATE.colorCount = colors;
        document.getElementById('start-screen').style.display = 'none';
        let label = colors === 4 ? "新兵" : (colors === 6 ? "老兵" : "兵王");
        document.getElementById('level-tag').innerText = `难度: ${label} (战术模式)`;
        restartLevel(true);
    }

    function restartLevel(newMap = false) {
        document.getElementById('win-screen').style.display = 'none';
        STATE.history = [];
        STATE.hand = [];
        STATE.fromRod = -1;
        updateDragLayer();
        generateLevel(); 
        render();
        document.addEventListener('mousemove', onMouseMove);
    }

    function generateLevel() {
        // 全局混沌洗牌 (保证极度混乱)
        let nutPool = [];
        for(let c = 0; c < STATE.colorCount; c++) {
            for(let i = 0; i < CONFIG.capacity; i++) nutPool.push(c);
        }
        // Fisher-Yates Shuffle
        for (let i = nutPool.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [nutPool[i], nutPool[j]] = [nutPool[j], nutPool[i]];
        }

        let rods = [];
        const totalRods = STATE.colorCount + CONFIG.emptyRods;
        for(let i=0; i<totalRods; i++) rods.push([]);

        let nutIndex = 0;
        for(let i=0; i<STATE.colorCount; i++) {
            for(let j=0; j<CONFIG.capacity; j++) {
                rods[i].push(nutPool[nutIndex++]);
            }
        }
        STATE.rods = rods;
    }

    // === 渲染核心 (实现点击特定螺母) ===
    function render() {
        const board = document.getElementById('board');
        board.innerHTML = '';
        
        STATE.rods.forEach((rodData, rodIdx) => {
            const div = document.createElement('div');
            div.className = 'rod-container';
            // 点击杆子本身(空白处) = 放下 / 或者拿最上面的
            div.onclick = (e) => handleRodClick(rodIdx);
            
            // 杆身
            const metal = document.createElement('div');
            metal.className = 'rod-metal';
            div.appendChild(metal);
            
            const base = document.createElement('div');
            base.className = 'rod-base';
            div.appendChild(base);

            // 螺母
            // 只有当这根杆子不是来源杆，或者手里没东西时，才完全渲染
            // 为了视觉连续性，我们这里渲染数组里的所有东西。
            // 只有在 updateDragLayer 里展示“拿起来”的部分。
            // 当拿起时，数组里的会被临时移除。
            
            rodData.forEach((cIdx, nutHeight) => {
                const nut = document.createElement('div');
                nut.className = 'nut';
                nut.style.backgroundColor = ALL_COLORS[cIdx];
                
                // === 关键：给每个螺母绑定点击事件 ===
                // 阻止冒泡，避免触发 rod 的点击
                nut.onclick = (e) => {
                    e.stopPropagation();
                    handleNutClick(rodIdx, nutHeight);
                };
                
                div.appendChild(nut);
            });

            board.appendChild(div);
        });
    }

    // === 交互逻辑升级 ===
    
    // 鼠标移动跟随
    function onMouseMove(e) {
        const layer = document.getElementById('drag-layer');
        if (STATE.hand.length > 0) {
            // 放在鼠标位置，稍微偏移一点视觉重心
            layer.style.left = e.clientX + 'px';
            layer.style.top = e.clientY + 'px';
        }
    }

    // 点击了某个具体的螺母 -> 拿起
    function handleNutClick(rodIdx, nutHeight) {
        if(!STATE.audioContext) STATE.audioContext = new (window.AudioContext||window.webkitAudioContext)();

        // 只有当手里是空的，才能去拿
        if (STATE.hand.length === 0) {
            const rod = STATE.rods[rodIdx];
            
            // 截断：从点击位置(nutHeight)到顶部(length-1)全部拿走
            // splice 会修改原数组，返回被删除的元素
            // 注意：splice(start) 会返回从 start 到结尾的所有元素
            
            saveHistory(); // 记录状态
            
            const nutsToTake = rod.splice(nutHeight); 
            STATE.hand = nutsToTake;
            STATE.fromRod = rodIdx;
            
            playSound('up');
            updateDragLayer();
            render();
        } else {
            // 手里有东西，点击螺母 = 点击这根杆子 = 尝试放下
            attemptDrop(rodIdx);
        }
    }

    // 点击了杆子（空白处）
    function handleRodClick(rodIdx) {
        if(!STATE.audioContext) STATE.audioContext = new (window.AudioContext||window.webkitAudioContext)();

        if (STATE.hand.length === 0) {
            // 手里没东西，点杆子 -> 默认拿起最上面的连续同色块 (经典模式兼容)
            // 或者：什么都不做，强制用户点螺母？
            // 为了体验好，点杆子默认拿最上面的一个色块组
            const rod = STATE.rods[rodIdx];
            if(rod.length === 0) return;
            
            const color = rod[rod.length - 1];
            let startIdx = rod.length - 1;
            while(startIdx >= 0 && rod[startIdx] === color) {
                startIdx--;
            }
            // startIdx 停在不同色的位置，所以要 +1
            handleNutClick(rodIdx, startIdx + 1);
            
        } else {
            // 手里有东西 -> 尝试放下
            attemptDrop(rodIdx);
        }
    }

    function attemptDrop(targetIdx) {
        const targetRod = STATE.rods[targetIdx];
        const movingStack = STATE.hand; // 手里的一串
        
        // 判定规则：
        // 1. 目标杆有空间放下这一整串
        // 2. 目标杆是空的 OR 目标杆顶颜色 == 手里这一串的最底下的颜色
        
        const spaceLeft = CONFIG.capacity - targetRod.length;
        const bottomNutColor = movingStack[0]; // hand[0] 是这串的最底下那个
        
        // 如果目标杆不为空，获取其顶部颜色
        const targetTopColor = targetRod.length > 0 ? targetRod[targetRod.length - 1] : -1;
        
        const colorMatch = (targetRod.length === 0) || (targetTopColor === bottomNutColor);
        
        if (colorMatch && spaceLeft >= movingStack.length) {
            // 成功：放入
            // movingStack 是 [底 -> 顶] 的顺序，直接 concat 上去
            STATE.rods[targetIdx] = targetRod.concat(movingStack);
            
            STATE.hand = [];
            STATE.fromRod = -1;
            
            playSound('down');
            updateDragLayer();
            render();
            checkWin();
        } else {
            // 失败：放回原处 或 提示错误
            if (targetIdx === STATE.fromRod) {
                // 原地放下 (取消)
                STATE.rods[STATE.fromRod] = STATE.rods[STATE.fromRod].concat(STATE.hand);
                STATE.hand = [];
                STATE.fromRod = -1;
                STATE.history.pop(); // 撤销刚才的记录
                updateDragLayer();
                render();
            } else {
                // 错误动画
                const div = document.querySelectorAll('.rod-container')[targetIdx];
                div.classList.remove('shake');
                void div.offsetWidth;
                div.classList.add('shake');
                
                const errs = ["塞不下", "颜色不对", "位置错了"];
                speak(errs[Math.floor(Math.random()*errs.length)]);
            }
        }
    }

    function updateDragLayer() {
        const layer = document.getElementById('drag-layer');
        layer.innerHTML = '';
        if(STATE.hand.length === 0) {
            layer.style.display = 'none';
        } else {
            layer.style.display = 'flex';
            // 渲染手里的串
            STATE.hand.forEach(cIdx => {
                const nut = document.createElement('div');
                nut.className = 'nut';
                nut.style.backgroundColor = ALL_COLORS[cIdx];
                // 手里的螺母稍微透明一点，或者加点发光
                nut.style.boxShadow = "0 0 10px rgba(255,255,255,0.5)";
                layer.appendChild(nut);
            });
        }
    }

    function saveHistory() {
        const snapshot = JSON.parse(JSON.stringify(STATE.rods));
        STATE.history.push(snapshot);
        if(STATE.history.length > 20) STATE.history.shift();
    }
    
    function undo() {
        if(STATE.history.length === 0) return;
        // 如果手里拿着，先放回
        if(STATE.hand.length > 0) {
             STATE.rods[STATE.fromRod] = STATE.rods[STATE.fromRod].concat(STATE.hand);
             STATE.hand = [];
             STATE.fromRod = -1;
             STATE.history.pop(); 
             updateDragLayer();
             render();
             return;
        }
        STATE.rods = STATE.history.pop();
        render();
    }

    function checkWin() {
        let finished = 0;
        for(let r of STATE.rods) {
            if(r.length === 0) continue;
            if(r.length !== CONFIG.capacity) return;
            const c = r[0];
            for(let x of r) if(x !== c) return;
            finished++;
        }
        if(finished === STATE.colorCount) {
            setTimeout(() => {
                document.getElementById('win-screen').style.display = 'flex';
                playSound('win');
                startFireworks();
            }, 300);
        }
    }

    // === 音效系统 ===
    function speak(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'zh-CN'; u.rate = 1.3;
        window.speechSynthesis.speak(u);
    }

    function playSound(t) {
        const ctx = STATE.audioContext;
        if(!ctx) return;
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        const now = ctx.currentTime;
        
        if(t==='up') {
            osc.frequency.setValueAtTime(250, now);
            osc.frequency.linearRampToValueAtTime(450, now+0.1);
            g.gain.value=0.1; osc.start(); osc.stop(now+0.1);
        } else if(t==='down') {
            osc.frequency.setValueAtTime(500, now);
            g.gain.value=0.1; osc.start(); osc.stop(now+0.1);
        } else if(t==='win') {
             [0, 0.2, 0.4, 0.6].forEach((d, i) => {
                 const o2 = ctx.createOscillator();
                 const g2 = ctx.createGain();
                 o2.connect(g2); g2.connect(ctx.destination);
                 o2.type = 'square';
                 o2.frequency.value = 440 + i*110;
                 g2.gain.setValueAtTime(0.1, now+d);
                 g2.gain.exponentialRampToValueAtTime(0.01, now+d+0.5);
                 o2.start(now+d); o2.stop(now+d+0.5);
             });
        }
    }

    function startFireworks() {
        const cvs = document.getElementById('confetti');
        const ctx = cvs.getContext('2d');
        cvs.width = window.innerWidth;
        cvs.height = window.innerHeight;
        const p = [];
        const colors = ALL_COLORS;
        for(let i=0; i<200; i++) {
            p.push({
                x: cvs.width/2, y: cvs.height/2,
                vx: (Math.random()-0.5)*20, vy: (Math.random()-1)*20,
                c: colors[Math.floor(Math.random()*colors.length)],
                size: Math.random()*8+4
            });
        }
        function draw() {
            if(document.getElementById('win-screen').style.display==='none') return;
            ctx.clearRect(0,0,cvs.width,cvs.height);
            p.forEach(pt=>{
                pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=0.4;
                ctx.fillStyle=pt.c; ctx.fillRect(pt.x, pt.y, pt.size, pt.size);
            });
            requestAnimationFrame(draw);
        }
        draw();
    }

    showStartScreen();

</script>
</body>
</html>
